name: Android CI

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

env:
  APPVAULT_REPO: "abhinav0014/app-vault"
  APP_ID: "abhi-qrld"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      apk_name: app-release.apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk

  release:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      download_url: ${{ steps.url.outputs.download_url }}

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: .

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Release build #${{ github.run_number }}"
          body: "Automated release from commit ${{ github.sha }}"
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set download URL
        id: url
        run: |
          echo "download_url=https://github.com/${{ github.repository }}/releases/download/build-${{ github.run_number }}/app-release.apk" >> $GITHUB_OUTPUT

  appvault:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout AppVault repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APPVAULT_REPO }}
          token: ${{ secrets.APPVAULT_TOKEN }}
          path: appvault

      - name: Fetch repo stats
        id: stats
        run: |
          REPO="${{ github.repository }}"

          DATA=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${REPO})

          STARS=$(echo "$DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['stargazers_count'])")

          RELEASES=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${REPO}/releases)

          DOWNLOADS=$(echo "$RELEASES" | python3 -c "
          import sys,json
          releases=json.load(sys.stdin)
          total=sum(
              a.get('download_count',0)
              for r in releases
              for a in r.get('assets',[])
              if a.get('name','').endswith('.apk')
          )
          print(total)
          ")

          echo "stars=$STARS" >> $GITHUB_OUTPUT
          echo "downloads=$DOWNLOADS" >> $GITHUB_OUTPUT

      - name: Generate icon
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          convert -size 256x256 xc:"#6d28d9" icon.png

      - name: Copy icon to AppVault
        run: |
          mkdir -p appvault/icons
          cp icon.png appvault/icons/${{ env.APP_ID }}.png

      - name: Update apps.json
        run: |
          cd appvault

          python3 << 'PYEOF'
          import json, os, datetime

          JSON_PATH = "apps.json"

          try:
              with open(JSON_PATH) as f:
                  apps = json.load(f)
          except:
              apps = []

          app_id = os.environ["APP_ID"]
          stars = int(os.environ["STARS"])
          downloads = int(os.environ["DOWNLOADS"])
          sha = os.environ["GITHUB_SHA"][:7]
          repo = os.environ["GITHUB_REPOSITORY"]
          today = datetime.date.today().isoformat()
          download_url = os.environ["DOWNLOAD_URL"]

          entry = {
              "id": app_id,
              "name": app_id.replace("-", " ").title(),
              "version": sha,
              "description": "Android app",
              "iconUrl": f"icons/{app_id}.png",
              "downloadUrl": download_url,
              "downloads": downloads,
              "stars": stars,
              "updated": today,
              "commit": sha
          }

          existing = next((a for a in apps if a["id"] == app_id), None)

          if existing:
              existing.update(entry)
          else:
              apps.append(entry)

          with open(JSON_PATH, "w") as f:
              json.dump(apps, f, indent=2)

          print("Updated apps.json")
          PYEOF
        env:
          APP_ID: ${{ env.APP_ID }}
          STARS: ${{ steps.stats.outputs.stars }}
          DOWNLOADS: ${{ steps.stats.outputs.downloads }}
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/build-${{ github.run_number }}/app-release.apk

      - name: Publish to AppVault
        run: |
          cd appvault
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json icons/
          git commit -m "chore(${{ env.APP_ID }}): update from ${{ github.repository }}@${{ github.sha }}" || exit 0
          git push
